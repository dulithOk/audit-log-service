version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"

  api:
    image: dulithf/audi-log:latest
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "8000"
    depends_on:
      - db

volumes:
  postgres_data:
