name: Build & Deploy

on:
  push:
    branches:
      - main     # trigger when pushing to main branch
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: echo "VERSION=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/audi-log:${{ steps.vars.outputs.VERSION }} \
                       -t ${{ secrets.DOCKER_USERNAME }}/audi-log:latest .

      - name: Push version tag
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/audi-log:${{ steps.vars.outputs.VERSION }}

      - name: Push latest tag
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/audi-log:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd audit-log
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
